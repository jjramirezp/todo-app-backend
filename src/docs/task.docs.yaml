/tasks:
  get:
    summary: Listar las tareas del usuario autenticado
    tags: [Tasks]
    security:
      - bearerAuth: []
    responses:
      200:
        description: Lista de tareas
      401:
        description: Token no proporcionado o inválido
  post:
    summary: Crear una nueva tarea
    tags: [Tasks]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title]
            properties:
              title:
                type: string
                example: Aprender Swagger
    responses:
      201:
        description: Tarea creada
      400:
        description: Datos inválidos

/tasks/{id}:
  put:
    summary: Actualizar una tarea existente
    tags: [Tasks]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: ID de la tarea a actualizar
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: Título actualizado
              done:
                type: boolean
                example: true
    responses:
      200:
        description: Tarea actualizada
      404:
        description: Tarea no encontrada
  delete:
    summary: Eliminar una tarea
    tags: [Tasks]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: ID de la tarea a eliminar
    responses:
      204:
        description: Tarea eliminada exitosamente
      404:
        description: Tarea no encontrada
